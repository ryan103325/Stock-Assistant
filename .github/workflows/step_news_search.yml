name: "[Step] News Search (Tavily)"

on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: '股票代號 (例如: 2330)'
        required: true
        type: string

jobs:
  news-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tavily-python

      - name: Search & Analyze
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m src.alpha_core.main search ${{ github.event.inputs.stock_id }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news/
          git diff --cached --quiet || git commit -m "🔍 [News] ${{ github.event.inputs.stock_id }} $(date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && break
            echo "Push failed (attempt $i), retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
