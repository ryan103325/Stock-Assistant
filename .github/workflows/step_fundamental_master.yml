name: "[Step] Fundamental Master"

on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: '股票代號 (例如: 2330)'
        required: true
        type: string
      force_mode:
        description: '強制執行（跳過交易日檢查）'
        required: false
        type: boolean
        default: true
      no_telegram:
        description: '不發送 Telegram（僅本地生成）'
        required: false
        type: boolean
        default: false

jobs:
  fundamental-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r fundamental_master/requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Fundamental Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_ACTIONS: true
        run: |
          ARGS="${{ github.event.inputs.stock_id }}"
          if [ "${{ github.event.inputs.no_telegram }}" = "true" ]; then
            ARGS="$ARGS --no-telegram"
          fi
          python -m fundamental_master.main $ARGS

      - name: Commit outputs
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/ || true
          git add docs/data/fundamental/ || true
          git diff --staged --quiet || git commit -m "📊 [Fundamental] ${{ github.event.inputs.stock_id }} $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
