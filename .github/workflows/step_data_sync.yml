name: "[Step] Data Sync"

on:
  # [已停用] 僅保留 00981A 排程，節省資源
  # schedule:
  #   - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      force_mode:
        description: '強制執行（跳過交易日檢查）'
        required: false
        type: boolean
        default: true

jobs:
  # 交易日檢查 (輕量，不需 Python)
  check-trading-day:
    uses: ./.github/workflows/check_trading_day.yml
    with:
      check_mode: today
      force: ${{ github.event.inputs.force_mode == 'true' }}
    secrets:
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

  # 主要工作 (僅交易日執行)
  data-sync:
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync stock data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python src/tools/data_pipeline/sync_stock_data.py

      - name: Remove success marker (force Pipeline re-run)
        run: |
          rm -f src/data_core/history/.update_success

      - name: Update stock prices (Pipeline)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python src/tools/data_pipeline/Pipeline_data.py

      - name: Update TAIEX data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python src/tools/data_pipeline/update_taiex.py

      - name: Convert CSV to JSON for chart site
        run: |
          python src/tools/data_pipeline/csv_to_json.py

      - name: Compute indicators (optimize_matrix)
        run: |
          python src/tools/data_pipeline/optimize_matrix.py

      - name: Commit and push updated data
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/data_core/ docs/data/
          git diff --staged --quiet || git commit -m "📊 [Step] Data sync $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy chart site [skip ci]"
