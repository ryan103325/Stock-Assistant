name: "[Step]strategies_00981A"

on:
  schedule:
    # 每天 UTC 10:00 (台灣 18:00) 自動執行，僅工作日
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force_mode:
        description: '強制執行（跳過交易日檢查）'
        required: false
        type: boolean
        default: true

jobs:
  # 交易日檢查 (輕量，不需 Python)
  check-trading-day:
    uses: ./.github/workflows/check_trading_day.yml
    with:
      check_mode: today
      force: ${{ github.event.inputs.force_mode == 'true' }}
    secrets:
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

  # 基金策略 (僅交易日執行)
  fund-strategy:
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf fonts-noto-cjk fonts-noto-color-emoji chromium-browser

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 00981a Fund Strategy (日報)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: true
        run: |
          python src/strategies/00981A/00981a.py --force

      - name: Check if last trading day of week & Run weekly report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: true
        run: |
          python src/strategies/00981A/check_and_run_weekly.py --force

      - name: Commit outputs
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/strategies/00981A/
          git diff --staged --quiet || git commit -m "📊 [Step] 00981a Fund $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
