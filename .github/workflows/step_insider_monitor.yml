name: "[Step] Insider Monitor"

on:
  schedule:
    # 每月 1 號 UTC 10:00 (台灣 18:00) 執行
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '測試模式（僅掃描前 30 檔）'
        required: false
        type: boolean
        default: false

jobs:
  insider-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Insider Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="--test"
          fi
          python -m src.strategies.insider_monitor.scraper $ARGS

      - name: Commit outputs
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/strategies/insider_monitor/
          git diff --staged --quiet || git commit -m "📊 [Step] Insider Monitor $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
