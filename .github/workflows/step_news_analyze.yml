name: "[Step]Morning News Analysis"

on:
  workflow_dispatch:
    inputs:
      force_mode:
        description: '強制執行'
        required: false
        type: boolean
        default: true
  # [已停用] 僅保留 00981A 排程，節省資源
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  news-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RSS News
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m src.alpha_core.main fetch

      - name: Analyze News Sentiment
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m src.alpha_core.main analyze

      - name: Export Sentiment JSON
        run: |
          python -m src.alpha_core.main export

      - name: Commit & Push Sentiment Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news/
          git diff --cached --quiet || git commit -m "📰 Update news sentiment data [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && break
            echo "Push failed (attempt $i), retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
